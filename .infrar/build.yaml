schema_version: 1
strategy: dockerfile
dockerfileContent: |
  FROM node:20-alpine
  WORKDIR /app
  COPY package.json ./
  RUN npm install --omit=dev
  COPY . .
  RUN addgroup -S appgroup && adduser -S appuser -G appgroup && chown -R appuser:appgroup /app
  USER appuser
  EXPOSE 3000
run:
  command: node server.js
  port: 3000
healthcheck:
  path: /
  port: 3000
env:
  - name: PORT
    default: "3000"
  - name: HOST
    default: 0.0.0.0
  - name: API_BASE
    default: /api
    from: orbit-api
