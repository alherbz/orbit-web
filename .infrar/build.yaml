schema_version: 1
strategy: dockerfile
dockerfileContent: |
  FROM node:20-alpine
  WORKDIR /app
  COPY package.json ./
  RUN npm install --omit=dev
  COPY server.js ./server.js
  COPY public ./public
  EXPOSE 3000
run:
  command: node server.js
  port: 3000
healthcheck:
  path: /
  port: 3000
env:
  - name: PORT
    default: "3000"
